name: deploy-portfolio

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  deploy:
    needs: ci
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t portfolio:latest .
        
      - name: Clean up old container
        run: |
          docker stop portfolio || true
          docker rm portfolio || true
          
      - name: Start new container
        run: docker run -d --name portfolio -p 90:80 --restart unless-stopped portfolio:latest